{{- if .Values.createDirectories -}}
{{- $app := .Values.hyfaaScheduler -}}
{{- if not $app.storage.external -}}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "sagui-platform.fullname" . }}-{{ $app.storage.pv_name }}
spec:
  capacity:
    storage: {{ $app.storage.size | default "100Gi" }}
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: {{ .Values.rootStoragePath }}/{{ $app.storage.pv_name | replace "-" "_" }}
  {{ if .Values.nodeSelector }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
      {{- range $k,$v := .Values.nodeSelector }}
        - key: {{ $k }}
          operator: In
          values:
          - {{ $v | quote }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}